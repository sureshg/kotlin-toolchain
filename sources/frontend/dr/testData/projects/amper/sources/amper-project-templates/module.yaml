product: jvm/lib

description: Contains template definitions that can be used to generate Amper projects (e.g. in `./kotlin init`).

apply:
  - ../dr.amper.common.module-template.yaml
  - ../dr.amper.used-in-idea.module-template.yaml

dependencies:
  - ./amper-project-template-resources

plugins:
  generate-template-resources: enabled

settings:
  kotlin:
    serialization: json
