product: jvm/app

description: The Amper command-line application.

apply:
  - //sources/common.module-template.yaml
  - //sources/can-have-pre-release-flags.module-template.yaml

repositories:
  - id: gradle-libs
    url: https://repo.gradle.org/gradle/libs-releases

dependencies:
  - //sources/amper-build-info
  - //sources/amper-compose-hot-reload
  - //sources/amper-jdk-provisioning
  - //sources/amper-maven-converter
  - //sources/amper-maven-publish
  - //sources/amper-project-templates
  - //sources/amper-telemetry
  - //sources/amper-wrapper
  - //sources/core
  - //sources/core-intellij
  - //sources/frontend-api
  - //sources/frontend/schema
  - //sources/frontend/dr
  - //sources/libraries/async-processes
  - //sources/libraries/compose-resources
  - //sources/libraries/compress
  - //sources/libraries/concurrency
  - //sources/libraries/incremental-cache
  - //sources/libraries/maven-central-configuration
  - //sources/libraries/pgp
  - //sources/libraries/serialization-extended
  - //sources/libraries/stdlib-extended
  - //sources/libraries/system-info
  - //sources/libraries/telemetry
  - //sources/libraries/xcode-model-ext
  - //sources/android-integration/amper-android-runner
  - //sources/android-integration/amper-android-sdk-detector
  - //sources/java-incremental-compilation/amper-jic-api
  - //sources/amper-maven-plugins-compatibility
  - $libs.bouncycastle.bcprov # for keystore generation
  - $libs.bouncycastle.bcpkix # for keystore generation
  - $libs.intellij.amper.xcodemodel
  - $libs.intellij.parsing.core
  - $libs.intellij.platform.util
  # the API itself is our Kotlin version, but we dynamically download the impl in the user-defined Kotlin version
  - $libs.kotlin.buildToolsApi
  - $libs.slf4j.api
  - $libs.tinylog.api
  - $libs.tinylog.impl
  - $libs.tinylog.slf4j
  - $libs.tinylog.jul
  - $libs.opentelemetry.api
  - $libs.opentelemetry.sdk
  - $libs.opentelemetry.sdkTrace
  - $libs.opentelemetry.kotlin
  - $libs.jna.platform
  # for files downloading
  - $libs.ktor.client.cio
  - $libs.ktor.client.encoding
  - $libs.ktor.client.auth
  - $libs.ktor.client
  # for something else
  - $libs.android.tools.sdklib
  - $libs.android.tools.common
  - $libs.android.tools.sdkCommon
  - $libs.android.tools.ddmlib
  - $libs.clikt
  - $libs.clikt.markdown
  - $libs.mordantCoroutines
  - $libs.xmlutil.serialization
  - $libs.intellij.deps.asyncProfiler
  - $libs.kotlinx.coroutines.debug
  - $libs.kotlinx.coroutines.slf4j
  - $libs.kotlinx.datetime
  - $libs.teamcity.serviceMessages
  - jakarta.xml.bind:jakarta.xml.bind-api:2.3.2 # required by Android SDK tools but somehow not brought transitively
  - $libs.ktor.server.core
  - $libs.ktor.server.netty
  - $libs.ktor.server.sse
  - $libs.ktor.server.contentNegotiation
  - $libs.ktor.serialization.kotlinx.json
  - $libs.maven.reporting
  - $libs.maven.plugin.annotations
  - $libs.maven.site.plugin
  - com.google.code.findbugs:jsr305:3.0.2
  - //sources/libraries/maven-central-portal-publisher-client

test-dependencies:
  - //sources/test-base

plugins:
  amper-distribution:
    enabled: true
    extraClasspaths:
      "plugins-processor": [ //sources/extensibility/amper-schema-processor ]
      "amper-jic-runner": [ //sources/java-incremental-compilation/amper-jic-runner ]
      "kotlin-build-tools-compat": [ $libs.kotlin.buildToolsCompat ]
    extraFilteredClasspaths:
      "extensibility-api":
        classpath:
          - //sources/extensibility/amper-extensibility-api
          - //sources/extensibility/amper-extensibility-sdk-stub
        includeIfFileNameContains: [ amper-extensibility ]
    embedClasspathAsResources:
      classpath: [ //sources/amper-junit-listeners ]
      resourceDirName: "junit-listeners"

settings:
  kotlin:
    serialization: json
  internal:
    excludeDependencies:
      # This is excluded in the pom.xml of `doxia-integration-tools` but we don't yet support excludes in DR: AMPER-923
      # TODO: Remove this when issue is solved.
      # NOTE: The maven subsystem worked before even with the "wrong" dependency being present in the classpath,
      #  but that relied on the Amper classpath ordering. And that ordering is not really stable atm: AMPER-5148
      - org.codehaus.plexus:plexus-component-api

      # This legacy ASM library (org.objectweb.asm.* as in ASM 3.x, where ClassVisitor is an interface) is pulled
      # transitively via:
      # org.apache.maven.plugins:maven-site-plugin:3.22.0
      #    ╰─── org.apache.maven.doxia:doxia-site-renderer:2.1.0
      #         ╰─── org.apache.velocity.tools:velocity-tools-generic:3.1
      #              ╰─── org.apache.commons:commons-digester3:3.2
      #                   ╰─── cglib:cglib:2.2.2
      #                        ╰─── asm:asm:3.3.1
      # It collides with the modern org.ow2.asm:asm (same package, but ClassVisitor is a class) that Sisu 1.0.0 now
      # requires since it stopped shading ASM, and which is brought via:
      # amper-maven-publish
      #     ╰─── org.apache.maven:maven-core:3.9.16
      #          ├─── org.eclipse.sisu:org.eclipse.sisu.plexus:1.0.0
      #          │    ╰─── org.eclipse.sisu:org.eclipse.sisu.inject:1.0.0
      #          │         ╰─── org.ow2.asm:asm:9.9.1
      #          ╰─── org.eclipse.sisu:org.eclipse.sisu.inject:1.0.0 (*)
      # Conflict resolution cannot solve this because of the change in coordinates, and having both on the classpath
      # causes an IncompatibleClassChangeError in org.eclipse.sisu.space.SpaceScanner (in MavenPluginsTest).
      # These obsolete coordinates are fully superseded by org.ow2.asm:asm, so we exclude them here.
      - asm:asm
