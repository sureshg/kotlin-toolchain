product: jvm/lib

description: Utilities to extract the plugins' schemas from their Kotlin code.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-idea.module-template.yaml
  - //sources/extensibility/uses-aa.module-template.yaml

settings:
  kotlin:
    serialization: json

dependencies:
  - //sources/extensibility/amper-extensibility-schema-model: exported
  - //sources/libraries/stdlib-extended

  - $libs.kotlin.analysis.api.for.ide: exported
  - $libs.kotlin.compiler: exported

  - $libs.kotlin.analysis.api.impl.base.for.ide: runtime-only
  - $libs.kotlin.analysis.api.k2.for.ide: runtime-only
  - $libs.kotlin.analysis.api.fir.for.ide: runtime-only
  - $libs.kotlin.analysis.api.platform.interface.for.ide: runtime-only
  - $libs.kotlin.symbol.light.classes.for.ide: runtime-only
  - com.github.ben-manes.caffeine:caffeine:2.9.3: runtime-only  # required for AA but is missing in deps somehow.

test-dependencies:
  - //sources/extensibility/amper-schema-processor
  - //sources/extensibility/amper-extensibility-api
  - //sources/extensibility/amper-extensibility-sdk-stub: runtime-only
  - //sources/test-base
  - $libs.kotlin.poet
