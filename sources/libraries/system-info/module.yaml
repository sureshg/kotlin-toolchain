product: jvm/lib

description: Cross-platform system information accessors.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-gradle.module-template.yaml
  - //sources/used-in-idea.module-template.yaml
  - //sources/used-in-kotlin-notebook.module-template.yaml

settings:
  jvm:
    # Used in IDEA (max 21), Android Gradle builds (max 17), and Kotlin Notebook (max 11), so we take the lowest version 11
    release: 11
  publishing:
    enabled: true
