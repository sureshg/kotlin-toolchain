product: jvm/lib

description: Kotlin extensions and coroutines integration for OpenTelemetry.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-gradle.module-template.yaml
  - //sources/used-in-idea.module-template.yaml
  - //sources/used-in-jic.module-template.yaml
  - //sources/used-in-kotlin-notebook.module-template.yaml

dependencies:
  - $libs.kotlinx.coroutines.core: exported # for CoroutineScope in the API
  - $libs.opentelemetry.api: exported
  - $libs.opentelemetry.kotlin: exported
  - $libs.opentelemetry.sdk

settings:
  kotlin:
    serialization:
      format: json
  jvm:
    # Used in Android Gradle builds (max 17), JIC (max 16), IDEA (max 21), and Notebooks (max 11), so we pick 11
    release: 11
