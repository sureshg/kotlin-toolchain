product: jvm/lib

description: Amper-aware dependency resolution library, based on the Amper-agnostic resolver.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-idea.module-template.yaml

test-dependencies:
  - //sources/test-base
  - org.reflections:reflections:0.10.2
  - $kotlin.reflect
  - //sources/amper-build-info

dependencies:
  - //sources/frontend/schema
  - //sources/amper-kotlin-native
  - //sources/amper-telemetry
  - //sources/core
  - //sources/dependency-resolution: exported
  - //sources/amper-problem-reporting: exported
  - //sources/libraries/telemetry
  - //sources/libraries/incremental-cache
  - //sources/libraries/maven-central-configuration
  - $libs.slf4j.api
  - $libs.intellij.platform.util

settings:
  kotlin:
    serialization:
      format: json

test-settings:
  kotlin:
    optIns: [ org.jetbrains.amper.frontend.schema.DiscouragedDirectDefaultVersionAccess ]

