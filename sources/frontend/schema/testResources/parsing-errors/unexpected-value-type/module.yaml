product:
  type: jvm/lib

settings:
  junit: <![Error] Unknown value `invalid`. Expected one of: [`junit-4`, `junit-5`, `none`]!>invalid<!>
  compose: <![Error] Expected `ComposeSettings ( "enabled" | {..} )`, but got `scalar`!>something-else<!>
  publishing: <![Error] Expected `PublishingSettings {..}`, but got `sequence []`!>[1,2,3]<!>
  kotlin:
    ksp:
      processorOptions:
        <![Error] Expected `mapping {string : string}`, but got `scalar`!>hello<!>
  jvm:
    storeParameterNames:
      <![Error] Expected `boolean ( "true" | "false" )`, but got `mapping {}`!>true: false<!>
    release: <![Error] Expected `integer | null`, but got `mapping {}`!>{1,2,3}<!>
  java:
    freeCompilerArgs:
      <![Error] Expected `sequence [string]`, but got `mapping {}`!>args: value<!>

dependencies:
  - <![Error] Wrong scoped dependency syntax. Possible syntax includes:  1. `<external-notation>` - a string with the format `<groupId>:<artifactId>:<version>`  2. `<local-notation>` - a path to another module (starting with the `//` for paths relative to the project root, e.g. `//foo`, or with the `.` for paths relative to the containing directory, e.g. `../foo`)  3. `<catalog-notation>` - a special reference to the version catalog, starting with the `$` symbol, e.g. `$libs.foo`  4. `bom: <catalog-notation> | <external-notation>` - BOM dependency   Additional dependency attributes (not for BOM) can be customized after the `:`, making it a single key-value mapping, e.g., `<external-notation>: exported` or `<local-notation>: compile-only`, etc. A full form may also be used, e.g. `<notation>: { exported: true, scope: compile-only }`!>[1,2,3]<!>