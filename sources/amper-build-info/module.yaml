# noinspection AmperEmptyModuleInspection
product: jvm/lib

description: Provides a generated `AmperBuild` class with build information such as version, date, git commit, etc.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-gradle.module-template.yaml
  - //sources/used-in-idea.module-template.yaml
  - //sources/used-in-jic.module-template.yaml

settings:
  jvm:
    # Used in IDEA (max 21), JIC (max 16), and Gradle (max 17), so we take the lowest version 16
    release: 16

plugins:
  generate-build-properties:
    enabled: true
    classSimpleName: AmperBuild
    classPackage: org.jetbrains.amper.buildinfo