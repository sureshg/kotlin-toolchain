product: jvm/lib

repositories:
  - id: mavenLocal
    url: mavenLocal
    resolve: false
    publish: true
  - id: repoNoCredentialsId
    url: REPO_URL
    resolve: false
    publish: true
  - id: repoId
    url: REPO_URL
    resolve: false
    publish: true
    credentials:
      file: p.properties
      usernameKey: scratch.username
      passwordKey: scratch.password

dependencies:
  - io.ktor:ktor-client-core:2.3.9

settings:
  publishing:
    enabled: true
    group: "amper.test.jvm-publish-custom-pom"
    version: "2.2"
    artifactId: artifactName
    pom:
      name: My Super Module
      url: https://example.com/my-module
      licenses:
        - name: Apache License, Version 2.0
          url: https://www.apache.org/licenses/LICENSE-2.0.txt
      developers:
        - id: john.doe
          name: John Doe
          email: john.doe@example.com
          organization: Example Inc.
          organizationUrl: https://example.com
      scm:
        url: https://github.com/example/my-module
