product: jvm/lib

description: Android SDK discovery utilities.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-gradle.module-template.yaml
  - //sources/used-in-idea.module-template.yaml

dependencies:
  - //sources/core
  - //sources/libraries/system-info

settings:
  jvm:
    # Used in Android Gradle builds (max 17) and IDEA (max 21), so we take the lowest version 17
    release: 17
  publishing:
    enabled: true
