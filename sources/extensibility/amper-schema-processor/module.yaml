product: jvm/lib

description: An executable processor that generates plugin descriptors from plugin sources.

apply:
  - //sources/common.module-template.yaml
  - //sources/extensibility/uses-aa.module-template.yaml

settings:
  kotlin:
    serialization: json

dependencies:
  - //sources/amper-telemetry
  - //sources/extensibility/amper-schema-processing
  - $libs.kotlin.analysis.api.standalone.for.ide

test-dependencies:
  - //sources/test-base
  - //sources/extensibility/amper-extensibility-api
  - //sources/extensibility/amper-extensibility-sdk-stub: runtime-only
