product: jvm/lib

description: Coroutines-friendly concurrency and locking utilities.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-gradle.module-template.yaml
  - //sources/used-in-idea.module-template.yaml
  - //sources/used-in-kotlin-notebook.module-template.yaml

dependencies:
  - $libs.kotlinx.coroutines.core

settings:
  jvm:
    # Used in Android Gradle builds (max 17), IDEA (max 21), and Notebooks (max 11), so we pick 11
    release: 11
