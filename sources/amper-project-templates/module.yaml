product: jvm/lib

description: Contains template definitions that can be used to generate Amper projects (e.g. in `./kotlin init`).

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-idea.module-template.yaml

dependencies:
  - //sources/amper-project-templates/amper-project-template-resources

plugins:
  generate-template-resources: enabled

settings:
  kotlin:
    serialization: json
