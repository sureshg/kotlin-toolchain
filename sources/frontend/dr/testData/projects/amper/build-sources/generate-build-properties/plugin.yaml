tasks:
  generate:
    action: !generateBuildProperties
      dotGitDirectory: ${project.rootDir}/.git
      taskOutputDirectory: ${taskOutputDir}
      version: ${module.settings.publishing.version}
      classSimpleName: ${pluginSettings.classSimpleName}
      classPackage: ${pluginSettings.classPackage}
      addDocumentationUrl: ${pluginSettings.addDocumentationUrl}

generated:
  sources:
    - language: kotlin
      directory: ${tasks.generate.action.taskOutputDirectory}
