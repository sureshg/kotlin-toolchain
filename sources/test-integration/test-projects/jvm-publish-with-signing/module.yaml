product: jvm/lib

repositories:
  - id: mavenLocal
    url: mavenLocal
    resolve: false
    publish: true

settings:
  publishing:
    enabled: true
    group: "amper.test.jvm-publish-with-signing"
    version: "2.2"
    name: artifactName
    signArtifacts: true
    publishSources: true
    mavenCentral:
      enabled: true
