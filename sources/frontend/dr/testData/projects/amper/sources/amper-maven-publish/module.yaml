product: jvm/lib

description: Maven publication support for Amper projects.

apply:
  - ../dr.amper.common.module-template.yaml

dependencies:
  - ../dependency-resolution: exported
  - ../frontend-api: exported
  - ../frontend/dr
  - ../libraries/maven-central-configuration
  - $libs.maven.core: exported
  - $libs.maven.resolver.connectorBasic: runtime-only
  - $libs.maven.resolver.transportHttp: runtime-only

settings:
  kotlin:
    serialization: enabled
