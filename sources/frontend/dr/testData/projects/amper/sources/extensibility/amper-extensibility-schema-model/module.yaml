product: jvm/lib

description: Data model to represent dynamic schemas brought by user-defined plugins.

apply:
  - ../../dr.amper.common.module-template.yaml
  - ../../dr.amper.used-in-gradle.module-template.yaml
  - ../../dr.amper.used-in-idea.module-template.yaml

dependencies:
  - ../../libraries/serialization-extended
  - ../../amper-problem-reporting: exported

settings:
  kotlin:
    serialization: enabled
  jvm:
    # Used in Android Gradle builds (max 17) and IDEA (max 21), so we pick 17
    release: 17
