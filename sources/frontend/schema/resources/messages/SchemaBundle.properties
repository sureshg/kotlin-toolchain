validation.types.dependency.wrong.syntax.scoped=Wrong scoped dependency syntax. Possible syntax includes: \
  \n1. `<external-notation>` - a string with the format `<groupId>:<artifactId>:<version>` \
  \n2. `<local-notation>` - a relative path to another Amper module starting with the `.` symbol, e.g. `../foo` \
  \n3. `<catalog-notation>` - a special reference to the version catalog, starting with the `$` symbol, e.g. `$libs.foo` \
  \n4. `bom: <catalog-notation> | <external-notation>` - BOM dependency \
  \n Additional dependency attributes (not for BOM) can be customized after the `:`, making it a single key-value mapping, e.g., \
  `<external-notation>: exported` or `<local-notation>: compile-only`, etc. A full form may also be used, e.g. `<notation>: '{' exported: true, scope: compile-only '}'`
