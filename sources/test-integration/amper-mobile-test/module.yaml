product: jvm/lib

description: Amper CLI tests in mobile scenarios.

test-dependencies:
  - //sources/test-base
  - $libs.kotlinx.coroutines.test

apply:
  - //sources/common.module-template.yaml

tasks:
  testJvm:
    # To build&publish the amper-android-gradle-plugin and deps for gradle-backed Android builds
    # To build&publish the CLI distribution and scripts required for wrapper-based tests
    dependsOn: [ :amper-android-gradle-plugin:publishJvmToMavenLocal, :amper-cli:uploadLocal@amper-distribution ]
