product: jvm/lib

description: Tests that verify the Amper bootstrap mechanism in the Amper wrapper scripts.

apply:
  - //sources/common.module-template.yaml

test-dependencies:
  - //sources/amper-jdk-provisioning
  - //sources/amper-wrapper
  - //sources/core
  - //sources/libraries/system-info
  - //sources/test-base

tasks:
  testJvm:
    # android gradle plugin is required for Android part of backend
    # fully built zip cli dist is required for wrapper tests and it's published to maven local
    dependsOn: [ :amper-android-gradle-plugin:publishJvmToMavenLocal, :amper-cli:uploadLocal@amper-distribution ]
