product: jvm/lib

description: Amper model parser – the real Amper frontend. It contains implementations of the frontend-api.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-gradle.module-template.yaml
  - //sources/used-in-idea.module-template.yaml

settings:
  kotlin:
    serialization:
      enabled: true
      format: json
    optIns: [ org.jetbrains.amper.frontend.schema.DiscouragedDirectDefaultVersionAccess ]
  jvm:
    # Used in Android Gradle builds (max 17) and IDEA (max 21), so we pick 17
    release: 17

plugins:
  amper-schema-generator: enabled

dependencies:
  - //sources/amper-build-info
  - //sources/amper-problem-reporting: exported
  - //sources/amper-telemetry
  - //sources/frontend-api: exported
  - //sources/extensibility/amper-extensibility-schema-model: exported
  - //sources/core
  - //sources/frontend/plain/toml-psi
  - //sources/frontend/plain/yaml-psi
  - //sources/frontend/plain/amper-psi
  - //sources/libraries/maven-central-configuration
  - //sources/libraries/maven-plugin-xml-parser: exported
  - //sources/libraries/stdlib-extended
  - //sources/libraries/system-info
  - //sources/libraries/telemetry
  - //sources/core-intellij
  - $libs.maven.artifact
  - $libs.intellij.platform.core: exported # because we expose Project in public API
  - $libs.intellij.platform.coreImpl
  - $libs.intellij.platform.ideCore
  - $libs.intellij.platform.util
  - $libs.xmlutil.serialization

test-dependencies:
  - //sources/test-base
  - $libs.junit.jupiter.params
