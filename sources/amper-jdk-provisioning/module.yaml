product: jvm/lib

description: JDK provisioning and discovery support for Amper.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-idea.module-template.yaml # the IDE needs to provision JDKs to set them in the workspace model

dependencies:
  - //sources/amper-problem-reporting: exported
  - //sources/core
  - //sources/frontend-api: exported
  - //sources/libraries/concurrency
  - //sources/libraries/incremental-cache: exported
  - //sources/libraries/jetbrains-jdk-list
  - //sources/libraries/serialization-extended
  - //sources/libraries/system-info
  - //sources/libraries/telemetry
  - $libs.kotlinx.coroutines.core
  - $libs.slf4j.api

test-dependencies:
  - //sources/test-base
  - $libs.junit.jupiter.params

settings:
  kotlin:
    serialization: json
