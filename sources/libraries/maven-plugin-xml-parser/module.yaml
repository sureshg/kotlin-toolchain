product: jvm/lib

description: Parser utilities for Maven plugin XML descriptors.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-gradle.module-template.yaml
  - //sources/used-in-idea.module-template.yaml

dependencies:
  - $libs.xmlutil.serialization

settings:
  kotlin:
    serialization: cbor
  jvm:
    # Used in Android Gradle builds (max 17) and IDEA (max 21), so we pick 17
    release: 17

