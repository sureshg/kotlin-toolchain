product: jvm/lib

description: Maven publication support for Amper projects.

apply:
  - //sources/common.module-template.yaml

dependencies:
  - //sources/dependency-resolution: exported
  - //sources/frontend-api: exported
  - //sources/frontend/dr
  - //sources/libraries/maven-central-configuration
  - $libs.maven.core: exported # exported for MavenRepositorySystem
  - $libs.maven.model: exported # exported for writePom(Model)
  - $libs.maven.resolver.api: exported # exported for Artifact, RemoteRepository, and the likes
  - $libs.maven.resolver.connectorBasic: runtime-only
  - $libs.maven.resolver.transport.http: runtime-only

settings:
  kotlin:
    serialization: enabled
