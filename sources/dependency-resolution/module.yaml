# This module provides Amper agnostic dependencies resolution.
# It doesn't know about the Amper model (AOM) and is capable of resolving dependencies
# by its maven coordinates (group:artifact:version)
# See details in https://docs.google.com/document/d/15yati1wtQPbiRKmFrhuvpwO-8G7-ACxdojn-40oEIEI/edit#heading=h.wfvvh1v0sye7

product: jvm/lib

description: Dependency resolution engine for Maven dependencies with Kotlin Multiplatform support.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-idea.module-template.yaml
  - //sources/used-in-kotlin-notebook.module-template.yaml

dependencies:
  - //sources/libraries/concurrency
  - //sources/libraries/nio-filechannels
  - //sources/libraries/maven-central-configuration
  - //sources/libraries/system-info
  - //sources/libraries/telemetry: exported
  - //sources/libraries/incremental-cache: exported
  - $libs.xmlutil.serialization
  - $libs.maven.artifact
  - $libs.kotlinx.coroutines.core
  - $libs.slf4j.api

test-dependencies:
  - //sources/test-base
  - $libs.opentelemetry.sdkTesting
  - $libs.system.stubs.jupiter

settings:
  jvm:
    # Used in IDEA (max 21) and Kotlin Notebook (max 11), so we take the lowest version 11
    release: 11
  kotlin:
    serialization:
      format: json

plugins:
  generate-build-properties:
    enabled: true
    classSimpleName: DependencyResolutionBuild
    classPackage: org.jetbrains.amper.dependency.resolution.buildinfo
    addDocumentationUrl: false