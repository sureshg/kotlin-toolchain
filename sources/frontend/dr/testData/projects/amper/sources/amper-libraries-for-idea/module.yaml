# noinspection AmperEmptyModuleInspection
product: jvm/lib

description: Umbrella module to simplify distribution and update of Amper libraries used in the IntelliJ plugin.

apply:
  - ../dr.amper.used-in-idea.module-template.yaml

dependencies:
  - ../amper-build-info: exported
  - ../amper-jdk-provisioning: exported
  - ../amper-maven-plugin-download: exported
  - ../amper-maven-plugins-compatibility: exported
  - ../amper-problem-reporting: exported
  - ../amper-project-templates: exported
  - ../amper-telemetry: exported
  - ../core-intellij: exported
  - ../core: exported
  - ../dependency-resolution: exported
  - ../extensibility/amper-schema-processing: exported
  - ../frontend-api: exported
  - ../frontend/dr: exported
  - ../frontend/schema: exported
  - ../libraries/maven-central-configuration: exported
  - ../libraries/maven-plugin-xml-parser: exported
  - ../libraries/system-info: exported
  - ../libraries/telemetry: exported
