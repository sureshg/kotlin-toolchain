repositories:
  - id: amper-maven
    url: https://packages.jetbrains.team/maven/p/amper/amper
    resolve: false
    publish: true
    credentials:
      file: ../local.properties
      usernameKey: space.username
      passwordKey: space.password
  - id: mavenCentral
    url: https://cache-redirector.jetbrains.com/repo.maven.apache.org/maven2
  - id: googleRepo
    url: https://cache-redirector.jetbrains.com/dl.google.com/dl/android/maven2
  - id: mavenLocal
    url: mavenLocal
    resolve: false
    publish: true
  - id: gradle
    url: https://cache-redirector.jetbrains.com/plugins.gradle.org/m2
  - id: intellij-repository
    url: https://cache-redirector.jetbrains.com/www.jetbrains.com/intellij-repository/releases
  - id: intellij-dependencies
    url: https://cache-redirector.jetbrains.com/packages.jetbrains.team/maven/p/ij/intellij-dependencies
  - id: libs-releases
    url: https://repo.gradle.org/gradle/libs-releases
  - id: teamcity-repository
    url: https://cache-redirector.jetbrains.com/download.jetbrains.com/teamcity-repository
  - id: amper-compose-hot-reload
    url: https://packages.jetbrains.team/maven/p/amper/compose-hot-reload

settings:
  publishing:
    group: org.jetbrains.amper
    version: 1.0-SNAPSHOT
    publishSources: true

  kotlin:
    version: 2.4.0
    progressiveMode: true
    freeCompilerArgs:
      - -Wextra
      - -Xcollection-literals
      - -Xconsistent-data-class-copy-visibility # generates copy() with the same visibility as the constructor
      - -Xexplicit-context-arguments
      - -Xintrinsic-const-evaluation
      - -Xname-based-destructuring=complete
      - -Xrender-internal-diagnostic-names
      - -Xreturn-value-checker=check
      - -Xwarning-level=REDUNDANT_ELSE_IN_WHEN:error
      - -Xwarning-level=UNCHECKED_CAST:error # At least suppress + explain why it's safe (where the check happened)
    optIns:
      - kotlin.contracts.ExperimentalContracts
      - kotlin.io.path.ExperimentalPathApi
      - kotlin.time.ExperimentalTime
  jvm:
    release: 21
    test:
      junitPlatformVersion: 6.0.3 # Keep it aligned with JUnit libs in our catalog
      extraEnvironment:
        KOTLIN_DEFAULT_MAVEN_CENTRAL_URL: https://cache-redirector.jetbrains.com/kotlin/repo1.maven.org/maven2
  java:
    compileIncrementally: false # Disabled because of AMPER-4868
  internal:
    excludeDependencies:
      - com.intellij.platform:kotlinx-coroutines-core-jvm

      # This legacy ASM library (org.objectweb.asm.* as in ASM 3.x, where ClassVisitor is an interface) is pulled
      # transitively via:
      # org.apache.maven.plugins:maven-site-plugin:3.22.0
      #    ╰─── org.apache.maven.doxia:doxia-site-renderer:2.1.0
      #         ╰─── org.apache.velocity.tools:velocity-tools-generic:3.1
      #              ╰─── org.apache.commons:commons-digester3:3.2
      #                   ╰─── cglib:cglib:2.2.2
      #                        ╰─── asm:asm:3.3.1
      # It collides with the modern org.ow2.asm:asm (same package, but ClassVisitor is a class) that Sisu 1.0.0 now
      # requires since it stopped shading ASM, and which is brought via:
      # amper-maven-publish
      #     ╰─── org.apache.maven:maven-core:3.9.16
      #          ├─── org.eclipse.sisu:org.eclipse.sisu.plexus:1.0.0
      #          │    ╰─── org.eclipse.sisu:org.eclipse.sisu.inject:1.0.0
      #          │         ╰─── org.ow2.asm:asm:9.9.1
      #          ╰─── org.eclipse.sisu:org.eclipse.sisu.inject:1.0.0 (*)
      # Conflict resolution cannot solve this because of the change in coordinates, and having both on the classpath
      # causes an IncompatibleClassChangeError in org.eclipse.sisu.space.SpaceScanner (in MavenPluginsTest).
      # These obsolete coordinates are fully superseded by org.ow2.asm:asm, so we exclude them here.
      - asm:asm

test-settings:
  kotlin:
    powerAssert: enabled
    freeCompilerArgs:
      - -Xallow-returns-result-of