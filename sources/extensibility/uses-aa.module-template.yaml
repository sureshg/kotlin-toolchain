apply:
  - //sources/common.module-template.yaml

repositories:
  - id: kotlin-ide-plugin-dependencies
    url: https://maven.pkg.jetbrains.space/kotlin/p/kotlin/kotlin-ide-plugin-dependencies

settings:
  jvm:
    test:
      systemProperties:
        # The combination of org.jetbrains.kotlin:kotlin-compiler and com.jetbrains.intellij.platform:util on the
        # runtime classpath registers a service loader with a broken XMLOutputFactory. This, in turn, makes JUnit fail
        # to write XML reports.
        # We use this system property to ensure the default implementation is used.
        # See https://docs.oracle.com/javase/8/docs/api/javax/xml/stream/XMLOutputFactory.html#newFactory--
        # This is not a bug per se. We can't in general prevent users from overriding this factory, and we should
        # respect it when they do, so we can't set this system property by default. And also, we can't know the
        # implementation class for sure anyway.
        javax.xml.stream.XMLOutputFactory: com.sun.xml.internal.stream.XMLOutputFactoryImpl
  internal:
    excludeDependencies:
      # this is a list of broken (unpublished) AA dependencies. See KT-61419.
      - org.jetbrains.kotlin:analysis-api
      - org.jetbrains.kotlin:analysis-api-impl-base
      - org.jetbrains.kotlin:analysis-api-fir
      - org.jetbrains.kotlin:analysis-api-fir-standalone-base
      - org.jetbrains.kotlin:analysis-api-platform-interface
      - org.jetbrains.kotlin:analysis-api-standalone
      - org.jetbrains.kotlin:analysis-api-standalone-base
      - org.jetbrains.kotlin:analysis-internal-utils
      - org.jetbrains.kotlin:low-level-api-fir
      - org.jetbrains.kotlin:symbol-light-classes
