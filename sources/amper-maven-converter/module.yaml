product: jvm/lib

description: A tool to convert Maven projects into Amper projects. The entrypoint is the `MavenProjectConvertor` class.

apply:
  - //sources/common.module-template.yaml
  - //sources/can-have-pre-release-flags.module-template.yaml

dependencies:
  - //sources/amper-maven-plugin-download
  - //sources/amper-telemetry
  - //sources/core
  - //sources/dependency-resolution
  - //sources/frontend-api
  - //sources/frontend/dr
  - //sources/frontend/schema
  - //sources/libraries/incremental-cache
  - //sources/libraries/maven-central-configuration
  - //sources/libraries/maven-plugin-xml-parser
  - //sources/libraries/stdlib-extended
  - $libs.maven.compat: runtime-only
  - $libs.maven.core
  - $libs.slf4j.api
  - $libs.xmlutil.serialization
