product: jvm/lib

description: Public API for extending Amper with custom plugins and tasks.

apply:
  - //sources/common.module-template.yaml
  - //sources/detekt.module-template.yaml
  - //sources/dokka.module-template.yaml

plugins:
  binary-compatibility-validator:
    enabled: true
  dokka:
    documentedVisibilities: [ public, internal ]

settings:
  publishing:
    # Currently, we add the amper-extensibility-api as a regular dependency downloaded from maven,
    # so we have to publish it.
    enabled: true
