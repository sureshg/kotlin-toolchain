product: jvm/lib

description: A gradle plugin to handle Android builds that are delegated from Amper.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-gradle.module-template.yaml

dependencies:
  - //sources/android-integration/amper-android-gradle-api
  - //sources/android-integration/amper-android-sdk-detector
  - //sources/frontend-api
  - //sources/frontend/schema
  - //sources/libraries/stdlib-extended
  - //sources/libraries/maven-central-configuration
  - $libs.android.gradle.plugin
  - $libs.google.services.gradle.plugin: runtime-only
  - $libs.gradle.api: compile-only

settings:
  kotlin:
    serialization: json
  publishing:
    enabled: true
    group: org.jetbrains.amper.android.settings.plugin
    artifactId: org.jetbrains.amper.android.settings.plugin.gradle.plugin
