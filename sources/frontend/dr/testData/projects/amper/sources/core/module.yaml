product: jvm/lib

apply:
  - ../dr.amper.common.module-template.yaml
  - ../dr.amper.used-in-gradle.module-template.yaml
  - ../dr.amper.used-in-idea.module-template.yaml

dependencies:
  - ../amper-build-info
  - ../amper-telemetry
  - ../libraries/concurrency
  - ../libraries/nio-filechannels
  - ../libraries/stdlib-extended
  - ../libraries/system-info
  - ../libraries/telemetry
  - ../libraries/maven-central-configuration
  - $libs.kotlinx.coroutines.core
  - $libs.apacheCommons.compress
  - $libs.slf4j.api
  - $libs.ktor.client: exported # exported because HttpClient is in the public API
  - $libs.ktor.client.encoding
  - $libs.ktor.client.auth
  - $libs.jna.platform

test-dependencies:
  - $libs.system.stubs.jupiter

settings:
  jvm:
    # Used in Android Gradle builds (max 17) and IDEA (max 21), so we pick 17
    release: 17
