product: jvm/lib

description: The Amper project model API, meant to be used by the CLI and IDEs.

apply:
  - //sources/common.module-template.yaml
  - //sources/used-in-gradle.module-template.yaml
  - //sources/used-in-idea.module-template.yaml

dependencies:
  - //sources/amper-build-info
  - //sources/amper-problem-reporting
  - //sources/core: exported
  - //sources/extensibility/amper-extensibility-schema-model: exported
  - //sources/libraries/stdlib-extended
  - $libs.intellij.platform.core
  - $libs.intellij.platform.util
  - $libs.maven.artifact

test-dependencies:
  - //sources/core-intellij
  - //sources/frontend/plain/yaml-psi
  - //sources/test-base
  - $libs.intellij.platform.coreImpl

settings:
  kotlin:
    optIns:
      - org.jetbrains.amper.frontend.schema.DiscouragedDirectDefaultVersionAccess # the frontend API is the intended place for it
  jvm:
    # Used in Android Gradle builds (max 17) and IDEA (max 21), so we pick 17
    release: 17
