product: jvm/app

description: Amper-aware dependency resolution library, based on the Amper-agnostic resolver.

apply:
  - ../../dr.amper.common.module-template.yaml
  - ../../dr.amper.used-in-idea.module-template.yaml

test-dependencies:
  - ../../test-base
  - org.reflections:reflections:0.10.2
  - $kotlin.reflect
  - ../../amper-build-info

dependencies:
  - ../schema
  - ../../amper-telemetry
  - ../../core
  - ../../dependency-resolution: exported
  - ../../libraries/telemetry
  - ../../libraries/incremental-cache
  - ../../libraries/maven-central-configuration
  - $libs.slf4j.api
  - $libs.intellij.platform.util

settings:
  kotlin:
    serialization:
      format: json

test-settings:
  kotlin:
    optIns: [ org.jetbrains.amper.frontend.schema.DiscouragedDirectDefaultVersionAccess ]

