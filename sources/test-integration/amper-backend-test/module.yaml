product: jvm/lib

description: Integration test utilities for the Amper backend.

dependencies:
  - //sources/amper-cli
  - //sources/amper-compose-hot-reload
  - //sources/core
  - //sources/core-intellij
  - //sources/frontend-api
  - //sources/frontend/schema

test-dependencies:
  - //sources/amper-telemetry
  - //sources/libraries/telemetry
  - //sources/test-base
  - $libs.gradle.toolingApi: compile-only
  - $libs.android.tools.ddmlib: compile-only

apply:
  - //sources/common.module-template.yaml

tasks:
  testJvm:
    dependsOn: [ :amper-android-gradle-plugin:publishJvmToMavenLocal ]
